name: Build Release On Version Change

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must contain a semantic version like 0.0.4. Found '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "package_name=tbot-ultra-win-x64-v$version" >> $env:GITHUB_OUTPUT
          "portable_name=tbot-ultra-win-x64-v$version-portable.zip" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TbotUltra.sln

      - name: Build
        run: dotnet build TbotUltra.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          dotnet test src/TbotUltra.Worker.Tests/TbotUltra.Worker.Tests.csproj -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test src/TbotUltra.Desktop.Tests/TbotUltra.Desktop.Tests.csproj -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Restore desktop publish dependencies
        run: dotnet restore src/TbotUltra.Desktop/TbotUltra.Desktop.csproj -r win-x64

      - name: Publish desktop app
        run: >
          dotnet publish src/TbotUltra.Desktop/TbotUltra.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          --no-restore
          -o temp_build_out/publish

      - name: Install bundled Chromium
        shell: pwsh
        run: |
          $browserRoot = Join-Path $PWD "temp_build_out\playwright-browsers"
          New-Item -ItemType Directory -Path $browserRoot -Force | Out-Null
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserRoot
          $scriptPath = Join-Path $PWD "src\TbotUltra.Desktop\bin\Release\net8.0-windows\win-x64\playwright.ps1"
          if (-not (Test-Path $scriptPath)) {
            throw "Could not find playwright.ps1 in desktop build output."
          }
          & $scriptPath install chromium
          if ($LASTEXITCODE -ne 0) {
            throw "Playwright Chromium install failed with exit code $LASTEXITCODE."
          }

      - name: Assemble release bundle
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
        shell: pwsh
        run: |
          $stageRoot = Join-Path $PWD "temp_build_out\release"
          $packageRoot = Join-Path $stageRoot $env:PACKAGE_NAME
          $publishRoot = Join-Path $PWD "temp_build_out\publish"
          $templateRoot = Join-Path $PWD ".release-template"
          $browserRoot = Join-Path $PWD "temp_build_out\playwright-browsers"

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          if (-not (Test-Path $publishRoot)) {
            throw "Publish output folder is missing: $publishRoot"
          }

          if (-not (Test-Path $templateRoot)) {
            throw "Release template folder is missing: $templateRoot"
          }

          if (-not (Test-Path $browserRoot)) {
            throw "Bundled Chromium folder is missing: $browserRoot"
          }

          New-Item -ItemType Directory -Path $packageRoot | Out-Null

          Copy-Item "$publishRoot\*" $packageRoot -Recurse -Force
          Rename-Item (Join-Path $packageRoot "TbotUltra.Desktop.exe") "Tbot Ultra.exe"

          # The Worker is an Sdk.Worker (Exe) project but runs in-process under the Desktop host;
          # it is never launched as its own .exe in the shipped product. Its runtimeconfig/deps
          # are referenced-project artifacts that leak next to the single-file exe, so drop them.
          # The later "Create portable zip" check still guards against any other stray runtime files.
          Remove-Item (Join-Path $packageRoot "TbotUltra.Worker.exe") -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $packageRoot "TbotUltra.Worker.runtimeconfig.json") -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $packageRoot "TbotUltra.Worker.deps.json") -ErrorAction SilentlyContinue

          Get-ChildItem $packageRoot -Directory | Where-Object {
            $_.Name -in @("cs", "de", "es", "fr", "it", "ja", "ko", "pl", "pt-BR", "ru", "tr", "zh-Hans", "zh-Hant")
          } | Remove-Item -Recurse -Force
          Get-ChildItem $packageRoot -Directory | Where-Object {
            $_.Name -in @("bin", "obj", "temp_build_out", "Captcha_solver", "__pycache__", ".venv")
          } | Remove-Item -Recurse -Force

          Copy-Item $browserRoot (Join-Path $packageRoot "ms-playwright") -Recurse -Force

          # Ship the Playwright driver (node.exe + package) from the regular framework build output.
          # The single-file publish embeds node.exe into the exe instead of leaving it loose under
          # .playwright\node, so the published copy is incomplete and Playwright fails with
          # "Driver not found". Overwrite it with the complete driver folder.
          $driverRoot = Join-Path $PWD "src\TbotUltra.Desktop\bin\Release\net8.0-windows\win-x64\.playwright"
          if (-not (Test-Path (Join-Path $driverRoot "node\win32_x64\node.exe"))) {
            throw "Playwright driver (node.exe) is missing from build output: $driverRoot"
          }
          $packagedDriverRoot = Join-Path $packageRoot ".playwright"
          if (Test-Path $packagedDriverRoot) {
            Remove-Item $packagedDriverRoot -Recurse -Force
          }
          Copy-Item $driverRoot $packagedDriverRoot -Recurse -Force

          $envTemplatePath = Join-Path $templateRoot "env.template"
          $readmeTemplatePath = Join-Path $templateRoot "README_RELEASE.txt"
          $configTemplatePath = Join-Path $templateRoot "config"

          if (-not (Test-Path $envTemplatePath)) {
            throw "Missing env template: $envTemplatePath"
          }
          if (-not (Test-Path $readmeTemplatePath)) {
            throw "Missing release README template: $readmeTemplatePath"
          }
          if (-not (Test-Path $configTemplatePath)) {
            throw "Missing config template folder: $configTemplatePath"
          }

          Copy-Item $envTemplatePath (Join-Path $packageRoot ".env") -Force
          Copy-Item $readmeTemplatePath (Join-Path $packageRoot "README.txt") -Force
          Copy-Item (Join-Path $PWD "VERSION") (Join-Path $packageRoot "VERSION") -Force
          Copy-Item $configTemplatePath (Join-Path $packageRoot "config") -Recurse -Force

          New-Item -ItemType Directory -Path (Join-Path $packageRoot "logs") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "playwright\.auth") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "config\account-analysis") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "config\cache\natar-farms") -Force | Out-Null

      - name: Create portable zip
        env:
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          PORTABLE_NAME: ${{ steps.version.outputs.portable_name }}
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD ("temp_build_out\release\" + $env:PACKAGE_NAME)
          $outputRoot = Join-Path $PWD "temp_build_out\dist"
          $zipPath = Join-Path $outputRoot $env:PORTABLE_NAME

          if (-not (Test-Path $packageRoot)) {
            throw "Portable source folder is missing: $packageRoot"
          }

          Remove-Item (Join-Path $packageRoot "playwright.ps1") -ErrorAction SilentlyContinue

          $appExe = Join-Path $packageRoot "Tbot Ultra.exe"
          if (-not (Test-Path $appExe)) {
            throw "Portable package is missing Tbot Ultra.exe."
          }

          $unexpectedRootFiles = Get-ChildItem $packageRoot -File | Where-Object {
            $_.Extension -eq ".dll" `
              -or $_.Name -like "*.deps.json" `
              -or $_.Name -like "*.runtimeconfig.json" `
              -or $_.Name -eq "playwright.ps1"
          }
          if ($unexpectedRootFiles) {
            $names = ($unexpectedRootFiles | Select-Object -ExpandProperty Name) -join ", "
            throw "Portable package root contains runtime files that should be bundled or moved: $names"
          }

          $unexpectedDirectories = Get-ChildItem $packageRoot -Directory -Recurse | Where-Object {
            $_.Name -in @("temp_build_out", "Captcha_solver", "__pycache__", ".venv")
          }
          if ($unexpectedDirectories) {
            $names = ($unexpectedDirectories | Select-Object -ExpandProperty FullName) -join ", "
            throw "Portable package contains build or captcha directories that should not ship: $names"
          }

          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          # Zip the package folder itself so it extracts into a single named folder
          # (run Tbot Ultra.exe inside it; no installation needed).
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path $zipPath)) {
            throw "Portable zip was not created: $zipPath"
          }

      - name: Create GitHub release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          PORTABLE_NAME: ${{ steps.version.outputs.portable_name }}
        shell: pwsh
        run: |
          $portablePath = Join-Path $PWD "temp_build_out\dist\$env:PORTABLE_NAME"

          if (-not (Test-Path $portablePath)) {
            throw "Portable zip is missing: $portablePath"
          }

          $notes = @"
          Automated release for version $env:VERSION_NUMBER.

          Portable ($env:PORTABLE_NAME): no installation needed. Extract the zip,
          move or rename the folder wherever you like (e.g. your Desktop), then run
          Tbot Ultra.exe inside it.

          Set up your account and server inside the app (Account -> Manage). No manual editing of .env or config files is needed.

          Tip: for multiple accounts, extract a separate copy of the portable folder per account and run them at the same time. Do not run two instances from the same folder.
          "@

          gh release create $env:TAG_NAME $portablePath `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Tbot Ultra $env:VERSION_NUMBER" `
            --notes $notes

          $releaseUrl = gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY --json url -q ".url"
          if ([string]::IsNullOrWhiteSpace($releaseUrl)) {
            throw "Release was created, but release URL could not be resolved."
          }

          "release_url=$releaseUrl" >> $env:GITHUB_OUTPUT

      - name: Announce release in Discord
        env:
          DISCORD_ANNOUNCEMENT_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          PORTABLE_NAME: ${{ steps.version.outputs.portable_name }}
          RELEASE_URL: ${{ steps.create_release.outputs.release_url }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: pwsh
        run: |
          $webhookUrl = $env:DISCORD_ANNOUNCEMENT_WEBHOOK_URL
          if ([string]::IsNullOrWhiteSpace($webhookUrl)) {
            $webhookUrl = $env:DISCORD_WEBHOOK_URL
          }
          if ([string]::IsNullOrWhiteSpace($webhookUrl)) {
            throw "Missing GitHub secret: DISCORD_ANNOUNCEMENT_WEBHOOK_URL"
          }

          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $commitMessage = ($env:COMMIT_MESSAGE -replace "`r", "").Trim()
          if ([string]::IsNullOrWhiteSpace($commitMessage)) {
            $commitMessage = "No commit message."
          }
          $commitMessage = $commitMessage -replace "```", "'''"
          if ($commitMessage.Length -gt 900) {
            $commitMessage = $commitMessage.Substring(0, 897) + "..."
          }

          $content = @(
            "**Tbot Ultra $env:VERSION_NUMBER is released**",
            "Portable: ``$env:PORTABLE_NAME``",
            "Commit: ``$shortSha``",
            "",
            "**Version notes**",
            "```text",
            $commitMessage,
            "```",
            "Download: <$env:RELEASE_URL>"
          ) -join "`n"

          $payload = @{ content = $content } | ConvertTo-Json -Depth 4
          Invoke-RestMethod -Uri $webhookUrl -Method Post -ContentType "application/json" -Body $payload | Out-Null
