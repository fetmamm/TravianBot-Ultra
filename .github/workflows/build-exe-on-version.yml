name: Build Release On Version Change

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must contain a semantic version like 0.0.4. Found '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "package_name=tbot-ultra-win-x64-v$version" >> $env:GITHUB_OUTPUT
          "asset_name=TbotUltra-Setup-win-x64-v$version.exe" >> $env:GITHUB_OUTPUT
          "portable_name=tbot-ultra-win-x64-v$version-portable.zip" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TbotUltra.sln

      - name: Build
        run: dotnet build TbotUltra.sln -c Release --no-restore

      - name: Test (non-blocking)
        continue-on-error: true
        run: dotnet test TbotUltra.sln -c Release --no-build

      - name: Restore desktop publish dependencies
        run: dotnet restore src/TbotUltra.Desktop/TbotUltra.Desktop.csproj -r win-x64

      - name: Publish desktop app
        run: >
          dotnet publish src/TbotUltra.Desktop/TbotUltra.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          --no-restore
          -o temp_build_out/publish

      - name: Install bundled Chromium
        shell: pwsh
        run: |
          $browserRoot = Join-Path $PWD "temp_build_out\playwright-browsers"
          New-Item -ItemType Directory -Path $browserRoot -Force | Out-Null
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserRoot
          $scriptPath = Join-Path $PWD "temp_build_out\publish\playwright.ps1"
          if (-not (Test-Path $scriptPath)) {
            throw "Could not find playwright.ps1 in publish output."
          }
          & $scriptPath install chromium
          if ($LASTEXITCODE -ne 0) {
            throw "Playwright Chromium install failed with exit code $LASTEXITCODE."
          }

      - name: Build captcha runtime
        shell: pwsh
        run: |
          $runtimeRoot = Join-Path $PWD "temp_build_out\captcha-runtime"
          $pythonHome = Join-Path $runtimeRoot "python-home"

          if (Test-Path $runtimeRoot) {
            Remove-Item $runtimeRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $runtimeRoot -Force | Out-Null

          $basePythonRoot = python -c "import sys; print(sys.base_prefix)"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($basePythonRoot)) {
            throw "Could not resolve base Python installation path."
          }

          Copy-Item $basePythonRoot $pythonHome -Recurse -Force
          & "$pythonHome\python.exe" -m pip install --upgrade pip
          & "$pythonHome\python.exe" -m pip install -r "Captcha_solver\math_ai\requirements-runtime.txt"
          if ($LASTEXITCODE -ne 0) {
            throw "Captcha runtime dependency install failed with exit code $LASTEXITCODE."
          }

          $pathsToRemove = @(
            (Join-Path $pythonHome "Include"),
            (Join-Path $pythonHome "Lib\ensurepip"),
            (Join-Path $pythonHome "Lib\site-packages\tensorflow\include"),
            (Join-Path $pythonHome "Lib\site-packages\pip"),
            (Join-Path $pythonHome "Lib\site-packages\pip-*.dist-info"),
            (Join-Path $pythonHome "Lib\site-packages\setuptools"),
            (Join-Path $pythonHome "Lib\site-packages\setuptools-*.dist-info"),
            (Join-Path $pythonHome "Lib\site-packages\wheel"),
            (Join-Path $pythonHome "Lib\site-packages\wheel-*.dist-info")
          )

          foreach ($path in $pathsToRemove) {
            Get-Item $path -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Assemble release bundle
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
        shell: pwsh
        run: |
          $stageRoot = Join-Path $PWD "temp_build_out\release"
          $packageRoot = Join-Path $stageRoot $env:PACKAGE_NAME
          $publishRoot = Join-Path $PWD "temp_build_out\publish"
          $templateRoot = Join-Path $PWD ".release-template"
          $browserRoot = Join-Path $PWD "temp_build_out\playwright-browsers"
          $captchaRuntimeRoot = Join-Path $PWD "temp_build_out\captcha-runtime"

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          if (-not (Test-Path $publishRoot)) {
            throw "Publish output folder is missing: $publishRoot"
          }

          if (-not (Test-Path $templateRoot)) {
            throw "Release template folder is missing: $templateRoot"
          }

          if (-not (Test-Path $browserRoot)) {
            throw "Bundled Chromium folder is missing: $browserRoot"
          }

          if (-not (Test-Path $captchaRuntimeRoot)) {
            throw "Captcha runtime folder is missing: $captchaRuntimeRoot"
          }

          New-Item -ItemType Directory -Path $packageRoot | Out-Null

          Copy-Item "$publishRoot\*" $packageRoot -Recurse -Force
          Rename-Item (Join-Path $packageRoot "TbotUltra.Desktop.exe") "Tbot Ultra.exe"

          Get-ChildItem $packageRoot -Directory | Where-Object {
            $_.Name -in @("cs", "de", "es", "fr", "it", "ja", "ko", "pl", "pt-BR", "ru", "tr", "zh-Hans", "zh-Hant")
          } | Remove-Item -Recurse -Force

          Copy-Item $browserRoot (Join-Path $packageRoot "ms-playwright") -Recurse -Force

          $assetDir = Join-Path $packageRoot "Assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null
          Copy-Item (Join-Path $PWD "assets\icons\icon_windows.ico") (Join-Path $assetDir "icon_windows.ico") -Force

          $captchaRoot = Join-Path $packageRoot "Captcha_solver\math_ai"
          New-Item -ItemType Directory -Path $captchaRoot -Force | Out-Null
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\solve_runtime.py") (Join-Path $captchaRoot "solve_runtime.py") -Force
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\captcha_solver.py") (Join-Path $captchaRoot "captcha_solver.py") -Force
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\classes.txt") (Join-Path $captchaRoot "classes.txt") -Force
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\model.keras") (Join-Path $captchaRoot "model.keras") -Force
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\requirements-runtime.txt") (Join-Path $captchaRoot "requirements-runtime.txt") -Force
          Copy-Item $captchaRuntimeRoot (Join-Path $captchaRoot ".venv") -Recurse -Force
          New-Item -ItemType Directory -Path (Join-Path $captchaRoot "debug_output") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $captchaRoot "review_dataset") -Force | Out-Null

          $envTemplatePath = Join-Path $templateRoot "env.template"
          $readmeTemplatePath = Join-Path $templateRoot "README_RELEASE.txt"
          $configTemplatePath = Join-Path $templateRoot "config"

          if (-not (Test-Path $envTemplatePath)) {
            throw "Missing env template: $envTemplatePath"
          }
          if (-not (Test-Path $readmeTemplatePath)) {
            throw "Missing release README template: $readmeTemplatePath"
          }
          if (-not (Test-Path $configTemplatePath)) {
            throw "Missing config template folder: $configTemplatePath"
          }

          Copy-Item $envTemplatePath (Join-Path $packageRoot ".env") -Force
          Copy-Item $readmeTemplatePath (Join-Path $packageRoot "README.txt") -Force
          Copy-Item (Join-Path $PWD "VERSION") (Join-Path $packageRoot "VERSION") -Force
          Copy-Item $configTemplatePath (Join-Path $packageRoot "config") -Recurse -Force

          New-Item -ItemType Directory -Path (Join-Path $packageRoot "logs") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "playwright\.auth") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "config\account-analysis") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "config\cache\natar-farms") -Force | Out-Null

      - name: Verify packaged runtime
        env:
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD ("temp_build_out\release\" + $env:PACKAGE_NAME)
          Copy-Item (Join-Path $PWD "Captcha_solver\math_ai\test.png") (Join-Path $packageRoot "test.png") -Force
          $env:PYTHONHOME = Join-Path $packageRoot "Captcha_solver\math_ai\.venv\python-home"
          $env:PYTHONPATH = Join-Path $env:PYTHONHOME "Lib\site-packages"
          & "$env:PYTHONHOME\python.exe" `
            "$packageRoot\Captcha_solver\math_ai\solve_runtime.py" `
            --image "$packageRoot\test.png"
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged captcha runtime verification failed with exit code $LASTEXITCODE."
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        env:
          ASSET_NAME: ${{ steps.version.outputs.asset_name }}
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
        shell: pwsh
        run: |
          $stageRoot = Join-Path $PWD "temp_build_out\release"
          $packageRoot = Join-Path $stageRoot $env:PACKAGE_NAME
          $outputRoot = Join-Path $PWD "temp_build_out\installer"
          $assetPath = Join-Path $outputRoot $env:ASSET_NAME
          $sourceDrive = "X:"

          if (Test-Path $outputRoot) {
            Remove-Item $outputRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $outputRoot | Out-Null

          if (-not (Test-Path $packageRoot)) {
            throw "Installer source folder is missing: $packageRoot"
          }

          if (Test-Path $sourceDrive) {
            subst $sourceDrive /D
          }

          subst $sourceDrive $packageRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Could not map installer source drive for: $packageRoot"
          }

          try {
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              "/DAppVersion=$env:VERSION_NUMBER" `
              "/DSourceDir=$sourceDrive\" `
              "/DOutputDir=$outputRoot" `
              "/DOutputBaseFilename=$([System.IO.Path]::GetFileNameWithoutExtension($env:ASSET_NAME))" `
              "installer\TbotUltraSetup.iss"

            if (-not (Test-Path $assetPath)) {
              throw "Installer was not created: $assetPath"
            }
          }
          finally {
            subst $sourceDrive /D | Out-Null
          }

      - name: Create portable zip
        env:
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          PORTABLE_NAME: ${{ steps.version.outputs.portable_name }}
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD ("temp_build_out\release\" + $env:PACKAGE_NAME)
          $outputRoot = Join-Path $PWD "temp_build_out\installer"
          $zipPath = Join-Path $outputRoot $env:PORTABLE_NAME

          if (-not (Test-Path $packageRoot)) {
            throw "Portable source folder is missing: $packageRoot"
          }

          # Drop the verification test image so it does not ship in the portable build.
          Remove-Item (Join-Path $packageRoot "test.png") -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $packageRoot "playwright.ps1") -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $packageRoot "Assets") -Recurse -Force -ErrorAction SilentlyContinue

          $appExe = Join-Path $packageRoot "Tbot Ultra.exe"
          if (-not (Test-Path $appExe)) {
            throw "Portable package is missing Tbot Ultra.exe."
          }

          $unexpectedRootFiles = Get-ChildItem $packageRoot -File | Where-Object {
            $_.Extension -eq ".dll" `
              -or $_.Name -like "*.deps.json" `
              -or $_.Name -like "*.runtimeconfig.json" `
              -or $_.Name -eq "playwright.ps1"
          }
          if ($unexpectedRootFiles) {
            $names = ($unexpectedRootFiles | Select-Object -ExpandProperty Name) -join ", "
            throw "Portable package root contains runtime files that should be bundled or moved: $names"
          }

          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          # Zip the package folder itself so it extracts into a single named folder
          # (run Tbot Ultra.exe inside it; no installation needed).
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path $zipPath)) {
            throw "Portable zip was not created: $zipPath"
          }

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          ASSET_NAME: ${{ steps.version.outputs.asset_name }}
          PORTABLE_NAME: ${{ steps.version.outputs.portable_name }}
        shell: pwsh
        run: |
          $assetPath = Join-Path $PWD "temp_build_out\installer\$env:ASSET_NAME"
          $portablePath = Join-Path $PWD "temp_build_out\installer\$env:PORTABLE_NAME"

          if (-not (Test-Path $portablePath)) {
            throw "Portable zip is missing: $portablePath"
          }

          $notes = @"
          Automated release for version $env:VERSION_NUMBER.

          Two download options:
          - Installer ($env:ASSET_NAME): run it to install the app, then start it.
          - Portable ($env:PORTABLE_NAME): no installation. Extract the zip and run Tbot Ultra.exe inside the folder.

          Set up your account and server inside the app (Account -> Manage). No manual editing of .env or config files is needed.

          Tip: for multiple accounts, extract a separate copy of the portable folder per account and run them at the same time. Do not run two instances from the same folder.
          "@

          gh release create $env:TAG_NAME $assetPath $portablePath `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Tbot Ultra $env:VERSION_NUMBER" `
            --notes $notes
