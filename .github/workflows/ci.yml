name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TbotUltra.sln

      - name: Build
        run: dotnet build TbotUltra.sln -c Release --no-restore

      - name: Test
        run: dotnet test TbotUltra.sln -c Release --no-build
