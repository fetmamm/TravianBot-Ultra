name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TbotUltra.sln

      - name: Build
        run: dotnet build TbotUltra.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          dotnet test src/TbotUltra.Worker.Tests/TbotUltra.Worker.Tests.csproj -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test src/TbotUltra.Desktop.Tests/TbotUltra.Desktop.Tests.csproj -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
